name: Hardware validation
description: Record a scrubbed Windows/Android integration test
title: "[Testing]: "
labels:
  - testing
body:
  - type: markdown
    attributes:
      value: |
        Use this form for capture, input, DPI, rotation, sleep/wake, scrcpy, and ADB validation. Do not include a raw device serial or private session/location data.

  - type: input
    id: commit
    attributes:
      label: AstroDesk commit
      placeholder: Full or short commit SHA
    validations:
      required: true

  - type: input
    id: computer
    attributes:
      label: Computer, Windows, and GPU
      placeholder: ThinkPad X1 Yoga ..., Windows 11 build ..., Intel ...
    validations:
      required: true

  - type: input
    id: displays
    attributes:
      label: Display topology and scaling
      placeholder: Internal 1920x1200 at 150%; external ... at 100%
    validations:
      required: true

  - type: input
    id: phone
    attributes:
      label: Phone and software
      placeholder: Galaxy S23 Ultra, Android ..., One UI ...
    validations:
      required: true

  - type: input
    id: tools
    attributes:
      label: ADB and scrcpy versions
    validations:
      required: true

  - type: textarea
    id: matrix
    attributes:
      label: Test matrix and results
      placeholder: |
        - [ ] Authorization/reconnect
        - [ ] Portrait/landscape capture
        - [ ] Fit/pixel-perfect
        - [ ] Click/drag/long press/wheel/right click
        - [ ] Keyboard/paste/toolbar
        - [ ] Resize/fullscreen/DPI/monitor move
        - [ ] scrcpy crash/restart
        - [ ] Sleep/wake
        - [ ] Long-session memory/FPS
    validations:
      required: true

  - type: textarea
    id: failures
    attributes:
      label: Failures and scrubbed diagnostics
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed the ADB serial, private coordinates, notes, and personal screenshots/log content.
          required: true
