name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_XMLDOC_MODE: skip

jobs:
  verify:
    name: Format, build, and test
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore AstroDesk.sln

      - name: Verify formatting
        run: dotnet format AstroDesk.sln --no-restore --verify-no-changes

      - name: Build
        run: dotnet build AstroDesk.sln --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: >-
          dotnet test AstroDesk.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect "XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults
          if-no-files-found: ignore
          retention-days: 14
