name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to package; it must match AstroDesk.App.csproj
        required: true
        default: "0.1.4"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_XMLDOC_MODE: skip

jobs:
  release:
    name: Test and package win-x64
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Resolve and validate release version
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $projectPath = "src/AstroDesk.App/AstroDesk.App.csproj"
          [xml] $project = Get-Content -Raw -LiteralPath $projectPath
          $projectVersion = $project.Project.PropertyGroup |
            ForEach-Object { $_.Version } |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Select-Object -First 1

          if ($env:EVENT_NAME -eq "push") {
            if (-not $env:REF_NAME.StartsWith("v", [StringComparison]::Ordinal)) {
              throw "Release tags must start with 'v'."
            }

            $releaseVersion = $env:REF_NAME.Substring(1)
          }
          else {
            $releaseVersion = $env:INPUT_VERSION
          }

          if ($releaseVersion -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Release version '$releaseVersion' is not a supported semantic version."
          }

          if ($projectVersion -ne $releaseVersion) {
            throw "Release version '$releaseVersion' does not match project version '$projectVersion'."
          }

          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore AstroDesk.sln

      - name: Verify formatting
        run: dotnet format AstroDesk.sln --no-restore --verify-no-changes

      - name: Build
        run: dotnet build AstroDesk.sln --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: >-
          dotnet test AstroDesk.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect "XPlat Code Coverage"
          --results-directory TestResults

      - name: Publish self-contained win-x64
        shell: pwsh
        run: |
          dotnet publish src/AstroDesk.App/AstroDesk.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output artifacts/publish/win-x64 `
            -p:Version=$env:RELEASE_VERSION `
            -p:ContinuousIntegrationBuild=true

      - name: Package portable archive and checksum
        shell: pwsh
        run: |
          $releaseDirectory = "artifacts/release"
          $packageName = "AstroDesk-$env:RELEASE_VERSION-win-x64"
          $packageDirectory = Join-Path "artifacts/package" $packageName
          $archivePath = Join-Path $releaseDirectory "$packageName.zip"
          $checksumPath = Join-Path $releaseDirectory "SHA256SUMS.txt"

          New-Item -ItemType Directory -Force -Path $releaseDirectory, $packageDirectory | Out-Null
          Copy-Item -Path "artifacts/publish/win-x64/*" -Destination $packageDirectory -Recurse -Force
          Copy-Item -LiteralPath "README.md", "LICENSE", "CHANGELOG.md" -Destination $packageDirectory -Force

          Compress-Archive -Path "$packageDirectory/*" -DestinationPath $archivePath -CompressionLevel Optimal -Force
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archivePath).Hash.ToLowerInvariant()
          "$hash  $([IO.Path]::GetFileName($archivePath))" |
            Set-Content -LiteralPath $checksumPath -Encoding ascii

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: AstroDesk-${{ env.RELEASE_VERSION }}-win-x64
          path: |
            artifacts/release/AstroDesk-${{ env.RELEASE_VERSION }}-win-x64.zip
            artifacts/release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-test-results
          path: TestResults
          if-no-files-found: ignore
          retention-days: 30

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $assets = Get-ChildItem -LiteralPath "artifacts/release" -File |
            ForEach-Object { $_.FullName }

          gh release view $env:TAG_NAME --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $assets --clobber --repo $env:GITHUB_REPOSITORY
          }
          else {
            gh release create $env:TAG_NAME $assets `
              --verify-tag `
              --generate-notes `
              --title "AstroDesk $env:RELEASE_VERSION" `
              --repo $env:GITHUB_REPOSITORY
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release creation/upload failed."
          }
